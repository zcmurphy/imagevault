<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoVault</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236495ed'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='18' fill='white'>◫</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f2f4f7; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f2f4f7; gap: 16px; z-index: 9999;
    }
    #loading .logo {
      width: 48px; height: 48px; border-radius: 12px; background: #6495ed;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff; box-shadow: 0 4px 16px rgba(100,149,237,0.4);
    }
    #loading .title  { font-size: 20px; font-weight: 700; color: #1c2133; }
    #loading .spinner {
      width: 28px; height: 28px; border: 3px solid #dce8fb;
      border-top-color: #6495ed; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    #loading .msg { font-size: 13px; color: #8e9ab0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Babel standalone: in-browser JSX transpilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

  <div id="loading">
    <div class="logo">◫</div>
    <div class="title">PhotoVault</div>
    <div class="spinner"></div>
    <div class="msg">Loading application…</div>
  </div>

  <div id="root"></div>

  <script type="module">
    const REACT     = "https://esm.sh/react@18.3.1";
    const REACT_DOM = "https://esm.sh/react-dom@18.3.1";

    // Import React first so we can expose it as a global.
    // Babel's classic JSX transform emits React.createElement() calls —
    // the transpiled blob module needs React in its own scope.
    // We achieve this by prepending "const React = [imported module]"
    // directly into the transpiled source before creating the blob.
    const ReactModule    = await import(REACT);
    const ReactDOMModule = await import(`${REACT_DOM}/client`);

    // Configure Babel — use the classic runtime (default).
    // We inject React into the blob ourselves via a prepended const.
    window.Babel.registerPreset("app", {
      presets: [
        [window.Babel.availablePresets["env"], {
          targets:  { esmodules: true },
          modules:  false,
        }],
        [window.Babel.availablePresets["react"], {
          runtime: "classic",   // emits React.createElement — React must be in scope
        }],
      ],
    });

    async function loadApp() {
      // ── 1. Fetch the JSX source ──────────────────────────────────────────────
      const res = await fetch("./photovault.jsx");
      if (!res.ok) throw new Error(`Failed to load photovault.jsx: ${res.status} ${res.statusText}`);
      const source = await res.text();

      // ── 2. Transpile JSX → ES module JS ─────────────────────────────────────
      const { code } = window.Babel.transform(source, {
        presets:    ["app"],
        filename:   "photovault.jsx",
        sourceType: "module",
      });

      // ── 3. Rewrite bare specifiers → full CDN URLs ───────────────────────────
      // Blob URL modules don't inherit the page's import map, so every
      // "react" / "react-dom" import must become an absolute CDN URL.
      let patched = code
        .replace(/from\s+"react-dom\/client"/g, `from "${REACT_DOM}/client"`)
        .replace(/from\s+'react-dom\/client'/g, `from '${REACT_DOM}/client'`)
        .replace(/from\s+"react-dom"/g,         `from "${REACT_DOM}"`)
        .replace(/from\s+'react-dom'/g,         `from '${REACT_DOM}'`)
        .replace(/from\s+"react"/g,             `from "${REACT}"`)
        .replace(/from\s+'react'/g,             `from '${REACT}'`);

      // ── 4. Inject React into the blob's own scope ────────────────────────────
      // Babel's classic transform calls React.createElement() at the top level.
      // Even though we imported React above, ES module scope is isolated —
      // the blob cannot see variables from the parent module.
      // Prepending this line gives the blob its own `React` binding that
      // resolves to the same already-cached module (no extra network request).
      patched = `import React from "${REACT}";\n` + patched;

      // ── 5. Load as a blob ES module and mount ────────────────────────────────
      const blob    = new Blob([patched], { type: "application/javascript" });
      const blobUrl = URL.createObjectURL(blob);
      const mod     = await import(blobUrl);
      URL.revokeObjectURL(blobUrl);

      const App  = mod.default;
      const root = ReactDOMModule.createRoot(document.getElementById("root"));
      root.render(ReactModule.createElement(App));

      document.getElementById("loading").style.display = "none";
    }

    loadApp().catch(err => {
      document.getElementById("loading").innerHTML = `
        <div style="text-align:center;padding:40px;max-width:480px">
          <div style="font-size:36px;margin-bottom:16px">⚠</div>
          <div style="font-size:18px;font-weight:700;color:#1c2133;margin-bottom:8px">Failed to load PhotoVault</div>
          <div style="font-size:13px;color:#526080;margin-bottom:20px;line-height:1.6">${err.message}</div>
          <div style="font-size:12px;color:#8e9ab0;line-height:1.6">
            Make sure <code style="background:#eef0f4;padding:2px 6px;border-radius:4px">photovault.jsx</code>
            is in the same folder as this file and is served over HTTPS
            (not <code style="background:#eef0f4;padding:2px 6px;border-radius:4px">file://</code>).
          </div>
          <button onclick="location.reload()" style="margin-top:20px;padding:9px 20px;background:#6495ed;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">
            Retry
          </button>
        </div>
      `;
    });
  </script>

</body>
</html>
